const PERSONAL_TYPES=["Task","Goal","Errand","Health","Finance","Social","Other"];

const PRI={

  Goal:{bg:"#EDE9FE",text:"#4C1D95",border:"#C4B5FD"},

  {id:3,title:"Wireless Security Lab",course:"CIS 375",type:"Lab",due:"2026-03-25",priority:"Medium",status:"In Progress",notes:"Kismet + airodump-ng writeup",repeat:"None",label:"",archived:false},
  {id:4,title:"Geography Map",course:"GPY 235",type:"Assignment",due:"2026-04-05",priority:"Low",status:"Not Started",notes:"",repeat:"None",label:"",archived:false},

const P_SAMPLE=[
  {id:101,title:"Apply for Student Dev Pack",course:"Personal",type:"Goal",due:"2026-04-01",priority:"High",status:"Not Started",notes:"Use GVSU email at education.github.com/pack",repeat:"None",label:"",archived:false},
  {id:102,title:"Set up VS Code + Git",course:"Home",type:"Task",due:"2026-03-28",priority:"Medium",status:"In Progress",notes:"Clone repo, install extensions",repeat:"None",label:"",archived:false},
  {id:103,title:"Grocery run",course:"Personal",type:"Errand",due:"2026-03-27",priority:"Low",status:"Not Started",notes:"",repeat:"None",label:"",archived:false},

function load(k,fb){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function daysLeft(due){return Math.ceil((new Date(due)-new Date())/86400000);}
function todayStr(){return new Date().toISOString().split("T")[0];}
function addDays(dateStr,n){const d=new Date(dateStr+"T00:00:00");d.setDate(d.getDate()+n);return d.toISOString().split("T")[0];}
function addMonths(dateStr,n){const d=new Date(dateStr+"T00:00:00");d.setMonth(d.getMonth()+n);return d.toISOString().split("T")[0];}

function nextDue(due,repeat){
  if(!repeat||repeat==="None")return due;
  if(repeat==="Daily")return addDays(due,1);
  if(repeat==="Weekly")return addDays(due,7);
  if(repeat==="Monthly")return addMonths(due,1);
  return due;
}

function DuePill({due,dark}){
  const d=daysLeft(due);
  let bg,color,label;
  if(d<0){bg=dark?"#4C1515":"#FFF0F0";color="#F87171";label="Overdue";}
  else if(d===0){bg=dark?"#4C3A10":"#FFF8EC";color="#FBBF24";label="Today";}
  else if(d<=2){bg=dark?"#4C3A10":"#FFF8EC";color="#F59E0B";label=d+"d";}
  else{bg=dark?"#1e3a5f":"#EFF6FF";color="#60A5FA";label=d+"d";}
  return <span style={{background:bg,color,fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:99,whiteSpace:"nowrap"}}>{label}</span>;
}

function StatusPill({status,dark}){
  const m=STATUS_META[status];
  const textColor=status==="Not Started"?(dark?"#94A3B8":"#64748B"):m.text;
  const bgColor=status==="Not Started"?(dark?"#1E293B":"#F8FAFC"):status==="In Progress"?(dark?"#1e2d6b":"#EEF0FF"):(dark?"#052e16":"#F0FDF4");
  return(
    <span style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:10,fontWeight:700,color:textColor,background:bgColor,padding:"2px 9px",borderRadius:99,whiteSpace:"nowrap",border:`1px solid ${m.dot}33`}}>
      <span style={{width:6,height:6,borderRadius:"50%",background:m.dot,flexShrink:0}}/>
      {m.label}
    </span>
  );
}

function Avatar({name,dark}){
  const i=name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
  return <div style={{width:28,height:28,borderRadius:"50%",background:dark?"#1e2d6b":ACCENT_LIGHT,color:dark?"#A5B4FC":ROYAL,fontSize:10,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,border:`1.5px solid ${dark?"#3B4FD8":ACCENT_MID}`}}>{i}</div>;
}

function CheckCircle({status,onClick}){
  const done=status==="Done",inP=status==="In Progress";
  const borderColor=done?"#16A34A":inP?ACCENT:"#CBD5E1";
  return(
    <div onClick={e=>{e.stopPropagation();onClick();}} style={{width:22,height:22,borderRadius:"50%",border:`2px solid ${borderColor}`,background:done?"#16A34A":"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0,transition:"all 0.2s"}}>
      {done&&<svg width="11" height="9" viewBox="0 0 11 9"><polyline points="1,4.5 4,7.5 10,1" stroke="white" strokeWidth="2.2" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>}
      {inP&&<div style={{width:9,height:9,borderRadius:"50%",background:ACCENT}}/>}
    </div>
  );
}

function Modal({task,onClose,onSave,groups,onAddGroup,typeList,dark}){
  const blank={title:"",course:groups[0],type:typeList[0],due:"",priority:"Medium",status:"Not Started",notes:"",repeat:"None",label:"",archived:false};
  const [form,setForm]=useState(task||blank);
  const [newG,setNewG]=useState("");

  const cardBg=d?DARK.bg2:"#F5F7FF";

  useEffect(()=>{const h=e=>{if(e.key==="Escape")onClose();};window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);},[]);
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(10,15,50,0.65)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999,padding:"1rem"}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:d?DARK.card:"#fff",borderRadius:20,border:`1.5px solid ${d?DARK.border:"#C7D2FE"}`,padding:"1.75rem",width:500,maxWidth:"100%",boxSizing:"border-box",maxHeight:"92vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div>
            <div style={{fontWeight:700,fontSize:18,color:d?DARK.text:ROYAL}}>{task?.id?"Edit task":"Add new task"}</div>
            <div style={{fontSize:11,color:d?DARK.text3:"#94A3B8",marginTop:2}}>Fill in the details below</div>
          </div>
          <button onClick={onClose} style={{background:d?DARK.bg3:ACCENT_LIGHT,border:"none",borderRadius:"50%",width:34,height:34,fontSize:20,color:d?"#A5B4FC":ACCENT,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div style={sec}>
            <label style={lbl}>Title</label>
            <input placeholder="e.g. Chapter 5 lab report" value={form.title} onChange={e=>set("title",e.target.value)} style={inputStyle}/>
          </div>
          <div style={sec}>
            <label style={{...lbl,marginBottom:12}}>Details</label>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              {[["course","Group",groups],["type","Type",typeList],["priority","Priority",PRIORITIES],["status","Status",STATUSES],["repeat","Repeat",REPEAT_OPTIONS]].map(([key,label,opts])=>(
                <div key={key}>
                  <label style={{...lbl,fontSize:11}}>{label}</label>
                  <select value={form[key]} onChange={e=>set(key,e.target.value)} style={{...inputStyle,appearance:"none",cursor:"pointer",fontSize:13}}>
                    {opts.map(o=><option key={o}>{o}</option>)}
                  </select>
                </div>
              ))}
            </div>
          </div>
          <div style={sec}>
            <label style={lbl}>Due date</label>
            <input type="date" value={form.due} onChange={e=>set("due",e.target.value)} style={inputStyle}/>
          </div>
          <div style={sec}>
            <label style={lbl}>Color label</label>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <button onClick={()=>set("label","")} style={{width:28,height:28,borderRadius:"50%",border:`2px solid ${!form.label?(d?"#A5B4FC":ACCENT):"#E2E8F0"}`,background:d?DARK.bg3:"#F1F5F9",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"#94A3B8"}}>✕</button>
              {LABEL_COLORS.map(c=>(
                <button key={c} onClick={()=>set("label",c)} style={{width:28,height:28,borderRadius:"50%",background:c,border:`3px solid ${form.label===c?"#fff":"transparent"}`,outline:form.label===c?`2px solid ${c}`:"none",transition:"all 0.15s"}}/>
              ))}
            </div>
          </div>
          <div style={sec}>
            <label style={lbl}>Notes <span style={{fontSize:10,fontWeight:400,color:d?DARK.text3:"#94A3B8",textTransform:"none",letterSpacing:0}}>({(form.notes||"").length}/500)</span></label>
            <textarea placeholder="Optional notes..." value={form.notes||""} onChange={e=>e.target.value.length<=500&&set("notes",e.target.value)} rows={4} style={{...inputStyle,resize:"vertical"}}/>
          </div>
          <div style={sec}>
            <label style={lbl}>Add new group</label>
            <div style={{display:"flex",gap:8}}>
              <input value={newG} onChange={e=>setNewG(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&newG.trim()){onAddGroup(newG.trim());set("course",newG.trim());setNewG("");}}} placeholder="Group name..." style={{...inputStyle,flex:1,fontSize:13}}/>
              <button onClick={()=>{if(newG.trim()){onAddGroup(newG.trim());set("course",newG.trim());setNewG("");}}} style={{padding:"10px 16px",fontSize:12,background:ACCENT_LIGHT,color:ACCENT,border:`1.5px solid ${ACCENT_MID}`,borderRadius:10,fontWeight:700,whiteSpace:"nowrap"}}>+ Add</button>
            </div>
          </div>
        </div>
        <div style={{display:"flex",gap:10,marginTop:20,justifyContent:"flex-end"}}>
          <button onClick={onClose} style={{padding:"10px 20px",fontSize:13,background:d?DARK.bg3:"#F1F5F9",border:`1.5px solid ${d?DARK.border:"#E2E8F0"}`,borderRadius:10,color:d?DARK.text2:"#64748B",fontWeight:600}}>Cancel</button>
          <button onClick={()=>{if(form.title&&form.due)onSave(form);}} style={{padding:"10px 24px",fontSize:13,background:ACCENT,color:"#fff",border:"none",borderRadius:10,fontWeight:700}}>{task?.id?"Save changes":"Add task"}</button>
        </div>
      </div>
    </div>
  );
}

function GradeTracker({storageKey,courses,dark}){
  const d=dark;
  const [grades,setGrades]=useState(()=>load(storageKey+"_grades",{}));
  const [newEntry,setNewEntry]=useState({course:courses[0]||"",name:"",score:"",total:"100"});
  useEffect(()=>save(storageKey+"_grades",grades),[grades]);
  const addGrade=()=>{
    if(!newEntry.course||!newEntry.name||newEntry.score==="")return;
    const key=newEntry.course;
    setGrades(g=>({...g,[key]:[...(g[key]||[]),{name:newEntry.name,score:parseFloat(newEntry.score),total:parseFloat(newEntry.total)||100,id:Date.now()}]}));
    setNewEntry(e=>({...e,name:"",score:"",total:"100"}));
  };
  const removeGrade=(course,id)=>setGrades(g=>({...g,[course]:(g[course]||[]).filter(e=>e.id!==id)}));
  const gpa=(list)=>{if(!list||list.length===0)return null;const avg=list.reduce((a,e)=>a+(e.score/e.total)*100,0)/list.length;return avg.toFixed(1);};
  const bg=d?DARK.bg2:"#fff";
  const border=d?DARK.border:"#E0E7FF";
  const text=d?DARK.text:"#1E293B";
  const text2=d?DARK.text2:"#64748B";
  const inputSt={fontSize:13,borderRadius:8,border:`1.5px solid ${d?"#475569":"#C7D2FE"}`,padding:"7px 10px",fontFamily:"inherit",color:text,background:d?DARK.bg3:"#F8FAFF"};
  return(
    <div style={{padding:"20px 28px"}}>
      <div style={{fontSize:16,fontWeight:700,color:d?DARK.text:ROYAL,marginBottom:16}}>Grade tracker</div>
      <div style={{background:bg,border:`1.5px solid ${border}`,borderRadius:14,padding:"16px",marginBottom:16}}>
        <div style={{fontSize:12,fontWeight:700,color:d?"#818CF8":"#4338CA",marginBottom:10,textTransform:"uppercase",letterSpacing:"0.06em"}}>Add grade</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"flex-end"}}>
          <select value={newEntry.course} onChange={e=>setNewEntry(n=>({...n,course:e.target.value}))} style={{...inputSt,flex:"1 1 120px"}}>
            {courses.map(c=><option key={c}>{c}</option>)}
          </select>
          <input placeholder="Assignment name" value={newEntry.name} onChange={e=>setNewEntry(n=>({...n,name:e.target.value}))} style={{...inputSt,flex:"2 1 160px"}}/>
          <input placeholder="Score" type="number" value={newEntry.score} onChange={e=>setNewEntry(n=>({...n,score:e.target.value}))} style={{...inputSt,width:80,flex:"0 0 80px"}}/>
          <span style={{fontSize:13,color:text2,flexShrink:0}}>/</span>
          <input placeholder="Total" type="number" value={newEntry.total} onChange={e=>setNewEntry(n=>({...n,total:e.target.value}))} style={{...inputSt,width:80,flex:"0 0 80px"}}/>
          <button onClick={addGrade} style={{padding:"8px 16px",fontSize:13,background:ACCENT,color:"#fff",border:"none",borderRadius:9,fontWeight:700,flexShrink:0}}>Add</button>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:14}}>
        {courses.map(course=>{
          const list=grades[course]||[];
          const avg=gpa(list);
          const pct=avg?parseFloat(avg):0;
          const color=pct>=90?"#16A34A":pct>=80?"#3B4FD8":pct>=70?"#F59E0B":"#E74C3C";
          return(
            <div key={course} style={{background:bg,border:`1.5px solid ${border}`,borderRadius:14,overflow:"hidden"}}>
              <div style={{padding:"12px 16px",borderBottom:`1px solid ${border}`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div style={{fontSize:13,fontWeight:700,color:d?DARK.text:ROYAL}}>{course}</div>
                {avg&&<div style={{fontSize:14,fontWeight:800,color}}>{avg}%</div>}
              </div>
              {list.length>0&&(
                <div style={{padding:"8px 0"}}>
                  {list.map(e=>(
                    <div key={e.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 16px"}}>
                      <span style={{flex:1,fontSize:12,color:text}}>{e.name}</span>
                      <span style={{fontSize:12,fontWeight:600,color:((e.score/e.total)*100)>=70?"#16A34A":"#E74C3C"}}>{e.score}/{e.total}</span>
                      <button onClick={()=>removeGrade(course,e.id)} style={{background:"none",border:"none",color:d?"#475569":"#CBD5E1",fontSize:14,padding:"0 2px"}}>×</button>
                    </div>
                  ))}
                  <div style={{margin:"8px 16px 4px",background:d?DARK.bg3:"#F1F5F9",borderRadius:99,height:4,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${Math.min(pct,100)}%`,background:color,borderRadius:99}}/>
                  </div>
                </div>
              )}
              {list.length===0&&<div style={{padding:"16px",fontSize:12,color:d?DARK.text3:"#94A3B8",textAlign:"center"}}>No grades yet</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function CalendarView({tasks,dark,onEdit}){
  const d=dark;
  const [month,setMonth]=useState(()=>{const n=new Date();return{y:n.getFullYear(),m:n.getMonth()};});
  const firstDay=new Date(month.y,month.m,1).getDay();
  const daysInMonth=new Date(month.y,month.m+1,0).getDate();
  const today=new Date();
  const cells=[];
  for(let i=0;i<firstDay;i++)cells.push(null);
  for(let i=1;i<=daysInMonth;i++)cells.push(i);
  const tasksByDay={};
  tasks.filter(t=>!t.archived&&t.due).forEach(t=>{
    const parts=t.due.split("-");
    if(parseInt(parts[0])===month.y&&parseInt(parts[1])-1===month.m){
      const day=parseInt(parts[2]);
      if(!tasksByDay[day])tasksByDay[day]=[];
      tasksByDay[day].push(t);
    }
  });
  const monthNames=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const bg=d?DARK.bg2:"#fff";
  const border=d?DARK.border:"#E0E7FF";
  const text=d?DARK.text:"#1E293B";
  const text2=d?DARK.text2:"#64748B";
  return(
    <div style={{padding:"20px 28px"}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
        <button onClick={()=>setMonth(m=>m.m===0?{y:m.y-1,m:11}:{y:m.y,m:m.m-1})} style={{width:32,height:32,borderRadius:8,border:`1.5px solid ${border}`,background:bg,color:text2,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div style={{fontSize:16,fontWeight:700,color:d?DARK.text:ROYAL,minWidth:160,textAlign:"center"}}>{monthNames[month.m]} {month.y}</div>
        <button onClick={()=>setMonth(m=>m.m===11?{y:m.y+1,m:0}:{y:m.y,m:m.m+1})} style={{width:32,height:32,borderRadius:8,border:`1.5px solid ${border}`,background:bg,color:text2,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:4}}>
        {["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(day=>(
          <div key={day} style={{textAlign:"center",fontSize:11,fontWeight:700,color:text2,padding:"4px 0"}}>{day}</div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
        {cells.map((day,i)=>{
          if(!day)return <div key={"e"+i}/>;
          const isToday=day===today.getDate()&&month.m===today.getMonth()&&month.y===today.getFullYear();
          const dayTasks=tasksByDay[day]||[];
          return(
            <div key={day} style={{background:isToday?(d?"#1e2d6b":ACCENT_LIGHT):bg,border:`1.5px solid ${isToday?ACCENT:border}`,borderRadius:10,padding:"6px 8px",minHeight:72}}>
              <div style={{fontSize:12,fontWeight:isToday?700:500,color:isToday?ACCENT:text,marginBottom:4}}>{day}</div>
              {dayTasks.slice(0,3).map(t=>(
                <div key={t.id} onClick={()=>onEdit(t)} style={{fontSize:10,fontWeight:600,color:t.status==="Done"?"#16A34A":PRI[t.priority]?.text||text2,background:t.status==="Done"?(d?"#052e16":"#F0FDF4"):(d?DARK.bg3:PRI[t.priority]?.bg||"#F5F7FF"),borderRadius:5,padding:"2px 5px",marginBottom:2,cursor:"pointer",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",borderLeft:t.label?`3px solid ${t.label}`:"none"}}>{t.title}</div>
              ))}
              {dayTasks.length>3&&<div style={{fontSize:9,color:text2,fontWeight:600}}>+{dayTasks.length-3} more</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function Tracker({storageKey,sampleData,defaultGroups,typeList,typeCMap,trackerName,dark,semester}){
  const d=dark;
  const [tasks,setTasks]=useState(()=>load(storageKey+"_tasks_"+semester,sampleData));
  const [groups,setGroups]=useState(()=>load(storageKey+"_groups",defaultGroups));
  const [nextId,setNextId]=useState(()=>load(storageKey+"_nid",900));
  const [modal,setModal]=useState(null);
  const [filterStatus,setFilterStatus]=useState("All");
  const [filterGroup,setFilterGroup]=useState("All");
  const [view,setView]=useState("list");
  const [expanded,setExpanded]=useState(null);
  const [sort,setSort]=useState("due");
  const [compact,setCompact]=useState(false);
  const [showArchive,setShowArchive]=useState(false);
  const [dismissedBanner,setDismissedBanner]=useState(()=>load("dismissed_banner_"+storageKey,[]) );
  const [activeTab,setActiveTab]=useState("tasks");
  const [dragId,setDragId]=useState(null);
  const [dragOverId,setDragOverId]=useState(null);

  useEffect(()=>save(storageKey+"_tasks_"+semester,tasks),[tasks,semester]);
  useEffect(()=>save(storageKey+"_groups",groups),[groups]);
  useEffect(()=>save(storageKey+"_nid",nextId),[nextId]);
  useEffect(()=>save("dismissed_banner_"+storageKey,dismissedBanner),[dismissedBanner]);

  const allGroups=useMemo(()=>[...new Set([...groups,...tasks.map(t=>t.course)])],[groups,tasks]);

  const saveTask=f=>{
    if(f.id)setTasks(ts=>ts.map(t=>t.id===f.id?f:t));
    else{setTasks(ts=>[...ts,{...f,id:nextId,archived:false}]);setNextId(n=>n+1);}
    setModal(null);
  };

  const cycleStatus=id=>{
    setTasks(ts=>ts.map(t=>{
      if(t.id!==id)return t;
      const next=STATUSES[(STATUSES.indexOf(t.status)+1)%3];
      if(next==="Done"&&t.repeat&&t.repeat!=="None"){
        const newDue=nextDue(t.due,t.repeat);
        setTimeout(()=>setTasks(prev=>[...prev,{...t,id:Date.now(),due:newDue,status:"Not Started"}]),300);
      }
      return{...t,status:next,archived:next==="Done"?false:t.archived};
    }));
  };

  const archiveTask=id=>setTasks(ts=>ts.map(t=>t.id===id?{...t,archived:true}:t));
  const unarchiveTask=id=>setTasks(ts=>ts.map(t=>t.id===id?{...t,archived:false}:t));
  const deleteTask=id=>{if(window.confirm("Delete this task?"))setTasks(ts=>ts.filter(t=>t.id!==id));};
  const addGroup=g=>{if(!allGroups.includes(g))setGroups(gs=>[...gs,g]);};

  const activeTasks=useMemo(()=>tasks.filter(t=>!t.archived),[tasks]);
  const archivedTasks=useMemo(()=>tasks.filter(t=>t.archived),[tasks]);

  const urgentTasks=useMemo(()=>{
    const today=todayStr();
    const tomorrow=addDays(today,1);
    return activeTasks.filter(t=>t.status!=="Done"&&t.due&&(t.due===today||t.due===tomorrow)&&!dismissedBanner.includes(t.id));
  },[activeTasks,dismissedBanner]);

  const filtered=useMemo(()=>{
    let t=[...activeTasks];
    if(filterStatus!=="All")t=t.filter(x=>x.status===filterStatus);
    if(filterGroup!=="All")t=t.filter(x=>x.course===filterGroup);
    if(sort==="due")t.sort((a,b)=>new Date(a.due)-new Date(b.due));
    else if(sort==="priority")t.sort((a,b)=>PRIORITIES.indexOf(a.priority)-PRIORITIES.indexOf(b.priority));
    else t.sort((a,b)=>a.course.localeCompare(b.course));
    return t;
  },[activeTasks,filterStatus,filterGroup,sort]);

  const grouped=useMemo(()=>{const g={};filtered.forEach(t=>{if(!g[t.course])g[t.course]=[];g[t.course].push(t);});return g;},[filtered]);

  const stats=useMemo(()=>({
    total:activeTasks.length,
    done:activeTasks.filter(t=>t.status==="Done").length,
    inProg:activeTasks.filter(t=>t.status==="In Progress").length,
    overdue:activeTasks.filter(t=>t.status!=="Done"&&t.due&&daysLeft(t.due)<0).length,
  }),[activeTasks]);
  const pct=stats.total?Math.round((stats.done/stats.total)*100):0;

  const bg=d?DARK.bg:"#F0F4FF";
  const cardBg=d?DARK.card:"#fff";
  const border=d?DARK.border:"#E0E7FF";
  const text=d?DARK.text:"#1E293B";
  const text2=d?DARK.text2:"#64748B";
  const text3=d?DARK.text3:"#94A3B8";
  const surfBg=d?DARK.bg2:"#F5F7FF";
  const sel={fontSize:11,padding:"5px 10px",borderRadius:8,border:`1.5px solid ${d?"#475569":"#C7D2FE"}`,background:cardBg,color:d?"#A5B4FC":"#3730A3",cursor:"pointer",outline:"none",fontFamily:"inherit",fontWeight:600};
  const rowPad=compact?"8px 18px":"13px 18px";

  const handleDragStart=(e,id)=>{setDragId(id);e.dataTransfer.effectAllowed="move";};
  const handleDragOver=(e,id)=>{e.preventDefault();setDragOverId(id);};
  const handleDrop=(e,targetId)=>{
    e.preventDefault();
    if(dragId===targetId){setDragId(null);setDragOverId(null);return;}
    setTasks(ts=>{
      const arr=[...ts];
      const fromIdx=arr.findIndex(t=>t.id===dragId);
      const toIdx=arr.findIndex(t=>t.id===targetId);
      const [moved]=arr.splice(fromIdx,1);
      arr.splice(toIdx,0,moved);
      return arr;
    });
    setDragId(null);setDragOverId(null);
  };

  const handlePrint=()=>{
    const win=window.open("","_blank");
    const rows=activeTasks.map(t=>`<tr><td>${t.title}</td><td>${t.course}</td><td>${t.type}</td><td>${t.priority}</td><td>${t.due||"—"}</td><td>${t.status}</td></tr>`).join("");
    win.document.write(`<html><head><title>${trackerName}</title><style>body{font-family:sans-serif;padding:20px}table{width:100%;border-collapse:collapse}th,td{border:1px solid #ddd;padding:8px;font-size:12px}th{background:#f0f4ff;font-weight:700}</style></head><body><h2>${trackerName} — ${semester}</h2><table><thead><tr><th>Task</th><th>Group</th><th>Type</th><th>Priority</th><th>Due</th><th>Status</th></tr></thead><tbody>${rows}</tbody></table></body></html>`);
    win.document.close();win.print();
  };

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden",background:bg}}>
      {modal!==null&&<Modal task={modal==="new"?null:modal} onClose={()=>setModal(null)} onSave={saveTask} groups={allGroups} onAddGroup={addGroup} typeList={typeList} dark={d}/>}

      {urgentTasks.length>0&&(
        <div className="no-print" style={{background:d?"#1c1a00":"#FFFBEB",borderBottom:`1.5px solid ${d?"#854D0E":"#FDE68A"}`,padding:"10px 28px",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",flexShrink:0}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#F59E0B" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          <span style={{fontSize:12,fontWeight:700,color:"#B45309"}}>Due soon:</span>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",flex:1}}>
            {urgentTasks.map(t=>(
              <span key={t.id} style={{fontSize:11,fontWeight:600,background:d?"#292000":"#FEF3C7",color:"#92400E",padding:"2px 10px",borderRadius:99,border:"1px solid #FDE68A"}}>
                {t.title} — {t.due===todayStr()?"today":tomorrow}
              </span>
            ))}
          </div>
          <button onClick={()=>setDismissedBanner(urgentTasks.map(t=>t.id))} style={{background:"none",border:"none",color:"#B45309",fontSize:18,padding:"0 4px",fontWeight:700}}>×</button>
        </div>
      )}

      <div className="no-print" style={{padding:"18px 28px 14px",borderBottom:`1.5px solid ${border}`,background:cardBg,flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,gap:12,flexWrap:"wrap"}}>
          <div style={{paddingLeft:36}}>
            <div style={{fontSize:20,fontWeight:800,color:d?DARK.text:ROYAL,letterSpacing:"-0.03em"}}>{trackerName}</div>
            <div style={{fontSize:11,color:d?"#818CF8":"#6366F1",marginTop:1,fontWeight:500}}>{semester} · GVSU</div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
            <button onClick={()=>setCompact(c=>!c)} title="Compact mode" style={{width:34,height:34,borderRadius:9,border:`1.5px solid ${border}`,background:compact?(d?"#1e2d6b":ACCENT_LIGHT):cardBg,color:compact?ACCENT:text3,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
            </button>
            <button onClick={handlePrint} title="Export to PDF" style={{width:34,height:34,borderRadius:9,border:`1.5px solid ${border}`,background:cardBg,color:text3,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
            </button>
            <button onClick={()=>setModal("new")} style={{display:"flex",alignItems:"center",gap:7,padding:"8px 18px",fontSize:13,fontWeight:700,background:`linear-gradient(135deg,${ACCENT},${ROYAL})`,color:"#fff",border:"none",borderRadius:11}}>
              <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><line x1="7" y1="1" x2="7" y2="13" stroke="white" strokeWidth="2.5" strokeLinecap="round"/><line x1="1" y1="7" x2="13" y2="7" stroke="white" strokeWidth="2.5" strokeLinecap="round"/></svg>
              New task
            </button>
          </div>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"repeat(4,minmax(0,1fr))",gap:10,marginBottom:14}}>
          {[
            {label:"Total",value:stats.total,path:"M4 6h16M4 10h16M4 14h8",color:d?DARK.text:ROYAL,ic:ACCENT},
            {label:"In progress",value:stats.inProg,path:"M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4",color:ACCENT,ic:ACCENT},
            {label:"Done",value:pct+"%",path:"M20 6L9 17l-5-5",color:"#15803D",ic:"#16A34A"},
            {label:"Overdue",value:stats.overdue,path:"M12 8v4l3 3M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z",color:stats.overdue>0?"#C0392B":(d?DARK.text3:"#94A3B8"),ic:stats.overdue>0?"#E74C3C":"#CBD5E1"},
          ].map(s=>(
            <div key={s.label} style={{background:surfBg,border:`1.5px solid ${border}`,borderRadius:12,padding:"12px 14px",display:"flex",flexDirection:"column",gap:8}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:10,fontWeight:700,color:d?"#818CF8":"#6366F1",textTransform:"uppercase",letterSpacing:"0.06em"}}>{s.label}</span>
                <div style={{width:24,height:24,borderRadius:7,background:s.ic+"22",display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={s.ic} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d={s.path}/></svg>
                </div>
              </div>
              <div style={{fontSize:24,fontWeight:800,color:s.color,letterSpacing:"-0.03em",lineHeight:1}}>{s.value}</div>
            </div>
          ))}
        </div>

        <div style={{background:d?DARK.bg3:"#E0E7FF",borderRadius:99,height:4,marginBottom:14,overflow:"hidden"}}>
          <div style={{height:"100%",width:pct+"%",background:`linear-gradient(90deg,${ACCENT},#16A34A)`,borderRadius:99,transition:"width 0.5s ease"}}/>
        </div>

        <div style={{display:"flex",gap:7,flexWrap:"wrap",alignItems:"center"}}>
          <div style={{display:"flex",background:d?DARK.bg3:"#E0E7FF",borderRadius:9,padding:3,gap:2}}>
            {[["list","List"],["board","Board"],["calendar","Calendar"],["grades","Grades"]].map(([v,lbl])=>(
              <button key={v} onClick={()=>{setView(v);setActiveTab("tasks");}} style={{padding:"5px 14px",fontSize:11,border:"none",borderRadius:7,background:view===v?cardBg:"transparent",color:view===v?(d?DARK.text:ROYAL):(d?"#818CF8":"#818CF8"),fontWeight:view===v?700:500,boxShadow:view===v?`0 1px 4px rgba(59,79,216,0.12)`:"none",transition:"all 0.15s"}}>{lbl}</button>
            ))}
          </div>
          {view!=="calendar"&&view!=="grades"&&<>
            <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} style={sel}>
              <option value="All">All statuses</option>
              {STATUSES.map(s=><option key={s}>{s}</option>)}
            </select>
            <select value={filterGroup} onChange={e=>setFilterGroup(e.target.value)} style={sel}>
              <option value="All">All groups</option>
              {allGroups.map(g=><option key={g}>{g}</option>)}
            </select>
            <select value={sort} onChange={e=>setSort(e.target.value)} style={sel}>
              <option value="due">Due date</option>
              <option value="priority">Priority</option>
              <option value="course">Group</option>
            </select>
          </>}
        </div>
      </div>

      <div style={{flex:1,overflowY:"auto",background:bg}}>
        {view==="grades"&&<GradeTracker storageKey={storageKey} courses={allGroups} dark={d}/>}
        {view==="calendar"&&<CalendarView tasks={activeTasks} dark={d} onEdit={t=>setModal(t)}/>}

        {(view==="list"||view==="board")&&(
          <div style={{padding:"18px 28px"}}>
            {view==="list"&&(
              <div style={{background:cardBg,border:`1.5px solid ${border}`,borderRadius:16,overflow:"hidden"}}>
                {Object.keys(grouped).length===0&&<div style={{padding:"3rem",textAlign:"center",color:text3,fontSize:13}}>No tasks — add one above.</div>}
                {Object.entries(grouped).map(([grp,gtasks],gi)=>(
                  <div key={grp}>
                    <div style={{display:"flex",alignItems:"center",gap:10,padding:"9px 18px",background:surfBg,borderTop:gi>0?`1.5px solid ${border}`:"none",borderBottom:`1.5px solid ${border}`}}>
                      <Avatar name={grp} dark={d}/>
                      <span style={{fontSize:13,fontWeight:700,color:d?DARK.text:ROYAL}}>{grp}</span>
                      <span style={{fontSize:10,fontWeight:700,color:d?"#818CF8":"#818CF8",background:cardBg,border:`1.5px solid ${border}`,borderRadius:99,padding:"1px 8px"}}>{gtasks.length}</span>
                    </div>
                    {gtasks.map((task,ti)=>{
                      const tc=(typeCMap[task.type]||typeCMap.Other);
                      const exp=expanded===task.id;
                      const done=task.status==="Done";
                      const isDragOver=dragOverId===task.id;
                      return(
                        <div key={task.id}
                          draggable
                          onDragStart={e=>handleDragStart(e,task.id)}
                          onDragOver={e=>handleDragOver(e,task.id)}
                          onDrop={e=>handleDrop(e,task.id)}
                          onDragEnd={()=>{setDragId(null);setDragOverId(null);}}
                          style={{borderBottom:ti<gtasks.length-1?`1px solid ${surfBg}`:"none",borderLeft:task.label?`4px solid ${task.label}`:"4px solid transparent",opacity:dragId===task.id?0.4:1,background:isDragOver?(d?"#1e2d6b":ACCENT_LIGHT):cardBg,transition:"background 0.1s"}}>
                          <div style={{display:"flex",alignItems:"center",gap:12,padding:rowPad,cursor:"pointer"}}
                            onMouseEnter={e=>!isDragOver&&(e.currentTarget.style.background=d?DARK.bg2:"#F8F9FF")}
                            onMouseLeave={e=>!isDragOver&&(e.currentTarget.style.background=isDragOver?(d?"#1e2d6b":ACCENT_LIGHT):cardBg)}
                            onClick={()=>setExpanded(exp?null:task.id)}>
                            <CheckCircle status={task.status} onClick={()=>cycleStatus(task.id)}/>
                            <span style={{flex:1,fontSize:compact?12:14,fontWeight:500,color:done?text3:text,textDecoration:done?"line-through":"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{task.title}</span>
                            <div style={{display:"flex",alignItems:"center",gap:5,flexShrink:0,flexWrap:"wrap",justifyContent:"flex-end"}}>
                              {!compact&&<StatusPill status={task.status} dark={d}/>}
                              <span style={{fontSize:10,fontWeight:700,background:tc.bg,color:tc.text,border:`1px solid ${tc.border}`,padding:"2px 8px",borderRadius:99}}>{task.type}</span>
                              {task.repeat&&task.repeat!=="None"&&<span style={{fontSize:9,fontWeight:700,background:d?"#1e2d6b":ACCENT_LIGHT,color:ACCENT,border:`1px solid ${ACCENT_MID}`,padding:"2px 7px",borderRadius:99}}>↻ {task.repeat}</span>}
                              {task.due&&<DuePill due={task.due} dark={d}/>}
                              <span style={{fontSize:11,color:text3,minWidth:50,textAlign:"right",fontWeight:500}}>{task.due?new Date(task.due+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"}):"—"}</span>
                            </div>
                            <div style={{display:"flex",gap:4}} onClick={e=>e.stopPropagation()}>
                              <button onClick={()=>setModal(task)} style={{padding:"3px 9px",fontSize:11,fontWeight:700,background:d?DARK.bg3:ACCENT_LIGHT,border:`1.5px solid ${d?DARK.border:ACCENT_MID}`,borderRadius:7,color:ACCENT}}>Edit</button>
                              {done&&<button onClick={()=>archiveTask(task.id)} style={{padding:"3px 9px",fontSize:11,fontWeight:700,background:d?"#052e16":"#F0FDF4",border:"1.5px solid #A7F3D0",borderRadius:7,color:"#16A34A"}}>Archive</button>}
                              <button onClick={()=>deleteTask(task.id)} style={{padding:"3px 8px",fontSize:11,fontWeight:700,background:d?"#2d0f0f":"#FFF0F0",border:"1.5px solid #FACACA",borderRadius:7,color:"#C0392B"}}>✕</button>
                            </div>
                          </div>
                          {exp&&(
                            <div style={{padding:`0 18px 12px 52px`,borderTop:`1px solid ${surfBg}`}}>
                              {task.notes&&<div style={{fontSize:13,color:text2,marginBottom:8,lineHeight:1.7,whiteSpace:"pre-wrap"}}>{task.notes}</div>}
                              <StatusPill status={task.status} dark={d}/>
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                ))}
              </div>
            )}

            {view==="board"&&(
              <div style={{display:"flex",gap:14,alignItems:"flex-start",overflowX:"auto",paddingBottom:12}}>
                {STATUSES.map(status=>{
                  const col=filtered.filter(t=>t.status===status);
                  const sm=STATUS_META[status];
                  return(
                    <div key={status} style={{flex:"0 0 300px",background:surfBg,borderRadius:16,border:`1.5px solid ${border}`,overflow:"hidden"}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,padding:"14px 16px",borderBottom:`1.5px solid ${border}`}}>
                        <div style={{width:9,height:9,borderRadius:"50%",background:sm.dot}}/>
                        <span style={{fontSize:13,fontWeight:700,color:d?DARK.text:ROYAL}}>{status}</span>
                        <span style={{marginLeft:"auto",fontSize:10,fontWeight:700,color:d?"#818CF8":"#818CF8",background:cardBg,border:`1.5px solid ${border}`,borderRadius:99,padding:"1px 8px"}}>{col.length}</span>
                      </div>
                      <div style={{display:"flex",flexDirection:"column",gap:10,padding:12}}>
                        {col.length===0&&<div style={{fontSize:12,color:text3,textAlign:"center",padding:"2rem 0"}}>Nothing here</div>}
                        {col.map(task=>{
                          const tc=(typeCMap[task.type]||typeCMap.Other);
                          const pc=PRI[task.priority];
                          return(
                            <div key={task.id} style={{background:cardBg,border:`1.5px solid ${border}`,borderRadius:12,padding:"14px 15px",borderLeft:task.label?`4px solid ${task.label}`:`1.5px solid ${border}`,transition:"border-color 0.15s"}}
                              onMouseEnter={e=>e.currentTarget.style.borderColor=ACCENT_MID}
                              onMouseLeave={e=>e.currentTarget.style.borderColor=task.label||border}>
                              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:6,marginBottom:8}}>
                                <span style={{fontSize:14,fontWeight:600,color:d?DARK.text:ROYAL,lineHeight:1.4}}>{task.title}</span>
                                <button onClick={()=>setModal(task)} style={{padding:"2px 8px",fontSize:12,background:d?DARK.bg3:ACCENT_LIGHT,border:`1.5px solid ${d?DARK.border:ACCENT_MID}`,borderRadius:7,color:ACCENT,flexShrink:0}}>···</button>
                              </div>
                              <div style={{fontSize:11,color:d?"#818CF8":"#818CF8",marginBottom:9,fontWeight:600}}>{task.course}</div>
                              <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:9}}>
                                <span style={{fontSize:10,fontWeight:700,background:tc.bg,color:tc.text,border:`1px solid ${tc.border}`,padding:"2px 8px",borderRadius:99}}>{task.type}</span>
                                <span style={{fontSize:10,fontWeight:700,background:pc.bg,color:pc.text,border:`1px solid ${pc.border}`,padding:"2px 8px",borderRadius:99}}>{task.priority}</span>
                                {task.due&&<DuePill due={task.due} dark={d}/>}
                                {task.repeat&&task.repeat!=="None"&&<span style={{fontSize:9,fontWeight:700,background:d?"#1e2d6b":ACCENT_LIGHT,color:ACCENT,border:`1px solid ${ACCENT_MID}`,padding:"2px 7px",borderRadius:99}}>↻ {task.repeat}</span>}
                              </div>
                              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",paddingTop:8,borderTop:`1px solid ${surfBg}`}}>
                                <span style={{fontSize:11,color:text3,fontWeight:500}}>{task.due?new Date(task.due+"T00:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"}):"No due date"}</span>
                                <StatusPill status={task.status} dark={d}/>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {archivedTasks.length>0&&(
              <div style={{marginTop:20}}>
                <button onClick={()=>setShowArchive(a=>!a)} style={{display:"flex",alignItems:"center",gap:8,fontSize:12,fontWeight:700,color:text2,background:"none",border:"none",padding:"4px 0",marginBottom:10}}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" style={{transform:showArchive?"rotate(90deg)":"rotate(0deg)",transition:"transform 0.2s"}}><polyline points="9 18 15 12 9 6"/></svg>
                  Archived tasks ({archivedTasks.length})
                </button>
                {showArchive&&(
                  <div style={{background:cardBg,border:`1.5px solid ${border}`,borderRadius:14,overflow:"hidden",opacity:0.8}}>
                    {archivedTasks.map((task,i)=>(
                      <div key={task.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 18px",borderBottom:i<archivedTasks.length-1?`1px solid ${surfBg}`:"none"}}>
                        <span style={{flex:1,fontSize:13,color:text3,textDecoration:"line-through"}}>{task.title}</span>
                        <span style={{fontSize:11,color:text3}}>{task.course}</span>
                        <button onClick={()=>unarchiveTask(task.id)} style={{padding:"3px 9px",fontSize:11,fontWeight:700,background:d?DARK.bg3:ACCENT_LIGHT,border:`1.5px solid ${ACCENT_MID}`,borderRadius:7,color:ACCENT}}>Restore</button>
                        <button onClick={()=>deleteTask(task.id)} style={{padding:"3px 8px",fontSize:11,fontWeight:700,background:d?"#2d0f0f":"#FFF0F0",border:"1.5px solid #FACACA",borderRadius:7,color:"#C0392B"}}>✕</button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            <div style={{marginTop:16,fontSize:10,color:d?DARK.text3:"#A5B4FC",display:"flex",gap:12,fontWeight:500}}>
              <span>Tasks save automatically</span><span>·</span>
              <span>Drag rows to reorder</span><span>·</span>
              <span>Click circle to cycle status</span><span>·</span>
              <span>Click row to expand</span>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

const TRACKERS_DEFAULT=[
  {id:"homework",label:"Homework",icon:"M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5",storageKey:"hw",sampleData:HW_SAMPLE,defaultGroups:DEFAULT_HW_COURSES,typeList:TYPES,typeCMap:HW_TYPE_C,name:"Homework tracker"},
  {id:"personal",label:"Personal",icon:"M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2M12 3a4 4 0 1 0 0 8 4 4 0 0 0 0-8z",storageKey:"personal",sampleData:P_SAMPLE,defaultGroups:DEFAULT_PERSONAL_CATS,typeList:PERSONAL_TYPES,typeCMap:P_TYPE_C,name:"Personal tracker"},
];

function NewTrackerModalWrapper({onClose,onSave,dark}){return <NewTrackerModal onClose={onClose} onSave={onSave} dark={dark}/>;}

function App(){
  const [trackers,setTrackers]=useState(()=>load("app_trackers_v2",TRACKERS_DEFAULT));
  const [activeId,setActiveId]=useState("homework");
  const [showNewTracker,setShowNewTracker]=useState(false);
  const [sidebarOpen,setSidebarOpen]=useState(true);
  const [dark,setDark]=useState(()=>load("dark_mode",false));
  const [semester,setSemester]=useState(()=>load("semester","Spring 2026"));
  const active=trackers.find(t=>t.id===activeId)||trackers[0];
  const d=dark;

  useEffect(()=>{
    const toSave=trackers.map(t=>({...t,sampleData:[]}));
    save("app_trackers_v2",toSave);
  },[trackers]);
  useEffect(()=>save("dark_mode",dark),[dark]);
  useEffect(()=>save("semester",semester),[semester]);

  const addTracker=(name,iconPath)=>{
    const id="custom_"+Date.now();
    const newT={id,label:name,icon:iconPath,storageKey:id,sampleData:[],defaultGroups:["General"],typeList:TYPES,typeCMap:HW_TYPE_C,name:name+" tracker"};
    setTrackers(ts=>[...ts,newT]);
    setActiveId(id);
    setShowNewTracker(false);
  };

  const deleteTracker=id=>{
    if(["homework","personal"].includes(id)){alert("Can't delete built-in trackers.");return;}
    if(window.confirm("Delete this tracker and all its tasks?")){
      setTrackers(ts=>ts.filter(t=>t.id!==id));
      setActiveId("homework");
    }
  };

  const sidebarBg=d?`linear-gradient(180deg,#0a0f2e 0%,#0d1a4a 100%)`:`linear-gradient(180deg,${ROYAL} 0%,#1e2d6b 100%)`;

  return(
    <div style={{display:"flex",height:"100vh",overflow:"hidden",position:"relative"}}>
      {showNewTracker&&<NewTrackerModalWrapper onClose={()=>setShowNewTracker(false)} onSave={addTracker} dark={d}/>}

      <div style={{width:sidebarOpen?235:0,minWidth:0,background:sidebarBg,display:"flex",flexDirection:"column",flexShrink:0,overflow:"hidden",transition:"width 0.25s cubic-bezier(.4,0,.2,1)"}}>
        <div style={{width:235,display:"flex",flexDirection:"column",height:"100%"}}>
          <div style={{padding:"22px 20px 16px",borderBottom:"1px solid rgba(255,255,255,0.08)"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:36,height:36,borderRadius:10,background:"rgba(255,255,255,0.12)",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><polyline points="9 16 11 18 15 14"/></svg>
              </div>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:"#fff"}}>My Tracker</div>
                <div style={{fontSize:10,color:"rgba(255,255,255,0.45)",marginTop:1}}>{semester}</div>
              </div>
            </div>
          </div>

          <div style={{padding:"14px 12px 8px",flex:1,overflowY:"auto"}}>
            <div style={{fontSize:9,fontWeight:700,color:"rgba(255,255,255,0.3)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8,paddingLeft:8}}>Trackers</div>
            {trackers.map(t=>{
              const isActive=t.id===activeId;
              return(
                <div key={t.id} style={{display:"flex",alignItems:"center",gap:2,marginBottom:2}}>
                  <button onClick={()=>setActiveId(t.id)} style={{flex:1,display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:10,border:"none",background:isActive?"rgba(255,255,255,0.14)":"transparent",color:isActive?"#fff":"rgba(255,255,255,0.55)",fontWeight:isActive?700:500,fontSize:13,textAlign:"left",transition:"all 0.15s"}}>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d={t.icon}/></svg>
                    <span style={{flex:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{t.label}</span>
                    {isActive&&<div style={{width:6,height:6,borderRadius:"50%",background:"#A5B4FC",flexShrink:0}}/>}
                  </button>
                  {!["homework","personal"].includes(t.id)&&(
                    <button onClick={()=>deleteTracker(t.id)} style={{padding:"4px 7px",background:"transparent",border:"none",color:"rgba(255,255,255,0.25)",fontSize:16,borderRadius:6}} title="Delete">×</button>
                  )}
                </div>
              );
            })}

            <button onClick={()=>setShowNewTracker(true)} style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderRadius:10,border:"1.5px dashed rgba(255,255,255,0.18)",background:"transparent",color:"rgba(255,255,255,0.4)",fontWeight:600,fontSize:12,textAlign:"left",marginTop:8,transition:"all 0.15s"}}
              onMouseEnter={e=>{e.currentTarget.style.background="rgba(255,255,255,0.07)";e.currentTarget.style.color="rgba(255,255,255,0.65)"}}
              onMouseLeave={e=>{e.currentTarget.style.background="transparent";e.currentTarget.style.color="rgba(255,255,255,0.4)"}}>
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><line x1="7" y1="1" x2="7" y2="13" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/><line x1="1" y1="7" x2="13" y2="7" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>
              Add tracker
            </button>

            <div style={{marginTop:20}}>
              <div style={{fontSize:9,fontWeight:700,color:"rgba(255,255,255,0.3)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8,paddingLeft:8}}>Semester</div>
              <select value={semester} onChange={e=>setSemester(e.target.value)} style={{width:"100%",fontSize:12,padding:"8px 10px",borderRadius:9,border:"1px solid rgba(255,255,255,0.15)",background:"rgba(255,255,255,0.08)",color:"rgba(255,255,255,0.8)",fontFamily:"inherit",cursor:"pointer",appearance:"none",outline:"none"}}>
                {SEMESTERS.map(s=><option key={s} style={{background:"#1e3a8a"}}>{s}</option>)}
              </select>
            </div>
          </div>

          <div style={{padding:"12px 12px 16px",borderTop:"1px solid rgba(255,255,255,0.08)"}}>
            <button onClick={()=>setDark(d=>!d)} style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:10,border:"1px solid rgba(255,255,255,0.12)",background:dark?"rgba(255,255,255,0.1)":"transparent",color:"rgba(255,255,255,0.7)",fontWeight:600,fontSize:12,transition:"all 0.15s"}}>
              {dark?(
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
              ):(
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
              )}
              {dark?"Light mode":"Dark mode"}
            </button>
          </div>
        </div>
      </div>

      <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column",position:"relative"}}>
        <button onClick={()=>setSidebarOpen(o=>!o)} style={{position:"absolute",top:"50%",left:sidebarOpen?-14:-14,transform:"translateY(-50%)",zIndex:50,width:28,height:28,borderRadius:"50%",background:d?DARK.card:"#fff",border:`2px solid ${d?DARK.border:ACCENT_MID}`,display:"flex",alignItems:"center",justifyContent:"center",color:ACCENT,boxShadow:`0 2px 10px rgba(59,79,216,0.25)`,transition:"all 0.2s",fontWeight:900}} title={sidebarOpen?"Hide sidebar":"Show sidebar"}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" style={{transform:sidebarOpen?"rotate(0deg)":"rotate(180deg)",transition:"transform 0.25s cubic-bezier(.4,0,.2,1)"}}>
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <Tracker
          key={active.id+"_"+semester}
          storageKey={active.storageKey}
          sampleData={active.sampleData}
          defaultGroups={active.defaultGroups}
          typeList={active.typeList}
          typeCMap={active.typeCMap}
          trackerName={active.name}
          dark={d}
          semester={semester}
        />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
